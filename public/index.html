<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GHRU Lecture Alerts Portal</title>
    <style>
      :root {
        --primary: #0b3c5d;
        --accent: #25d366;
        --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        --card-bg: #ffffff;
        --text-main: #2c3e50;
        --text-muted: #7f8c8d;
      }

      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg-gradient);
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
      }

      .portal-card {
        background: var(--card-bg);
        width: 100%;
        max-width: 500px;
        padding: 40px 30px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        transition: transform 0.3s ease;
      }

      .portal-card:hover {
        transform: translateY(-5px);
      }

      .brand-header h1 {
        color: var(--primary);
        font-size: 1.8rem;
        margin: 0 0 8px 0;
        letter-spacing: -0.5px;
      }

      .brand-header p {
        color: var(--text-muted);
        font-size: 0.95rem;
        margin: 0 0 24px 0;
      }

      .badge {
        display: inline-block;
        background: rgba(37, 211, 102, 0.15);
        color: #128c7e;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 30px;
        letter-spacing: 0.5px;
      }

      .form-group {
        text-align: left;
        margin-bottom: 22px;
      }

      label {
        display: block;
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--text-main);
        margin-bottom: 8px;
      }

      input[type="tel"] {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 1rem;
        color: var(--text-main);
        transition: all 0.2s ease;
        box-sizing: border-box;
        background: #f8fafc;
      }

      input[type="tel"]:focus {
        outline: none;
        border-color: var(--primary);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(11, 60, 93, 0.15);
      }

      .btn-action {
        width: 100%;
        padding: 15px;
        background: var(--accent);
        color: #ffffff;
        border: none;
        border-radius: 8px;
        font-size: 1.05rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        transition: all 0.2s ease;
        margin-top: 10px;
      }

      .btn-action:hover {
        background: #1ebd59;
        box-shadow: 0 6px 16px rgba(37, 211, 102, 0.4);
        transform: translateY(-1px);
      }

      .status-banner {
        margin-top: 25px;
        padding: 15px;
        border-radius: 8px;
        font-size: 0.9rem;
        line-height: 1.4;
        display: none;
        animation: fadeIn 0.4s ease forwards;
      }

      .status-banner.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .status-banner.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="portal-card">
      <div class="brand-header">
        <h1>G H Raisoni University</h1>
        <p>Department of Computer Applications — BCA Sem-III</p>
      </div>

      <span class="badge">⏱️ 10-Min Live Alerts Enabled</span>

      <form id="alertSystemForm">
        <div class="form-group">
          <label for="phone">WhatsApp Target Number</label>
          <input
            type="tel"
            id="phone"
            placeholder="e.g., +919876543210"
            required
          />
        </div>
        <button type="submit" class="btn-action">Activate Subscriptions</button>
      </form>

      <div id="statusBanner" class="status-banner"></div>
    </div>

    <script>
      document
        .getElementById("alertSystemForm")
        .addEventListener("submit", async function (event) {
          event.preventDefault();
          const phone = document.getElementById("phone").value.trim();
          const banner = document.getElementById("statusBanner");

          banner.style.display = "none";

          try {
            const endpointResponse = await fetch("/api/subscribe", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ phone }),
            });

            if (endpointResponse.ok) {
              banner.className = "status-banner success";
              banner.innerHTML =
                "<strong>Setup Verified!</strong><br>Automated alerts containing subject name, teacher name, and lecture time will hit your WhatsApp 10 minutes before class starts.";
            } else {
              throw new Error();
            }
          } catch (error) {
            banner.className = "status-banner error";
            banner.innerHTML =
              "<strong>Connection Refused</strong><br>Could not subscribe. Make sure your server engine terminal is active.";
          }

          banner.style.display = "block";
        });
    </script>
  </body>
</html>
