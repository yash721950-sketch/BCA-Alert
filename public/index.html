<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCA Alerts | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7b2cbf;       /* Vibrant Purple */
            --primary-hover: #9d4edd; /* Light Purple */
            --bg: #0a0a0c;            /* Rich Deep Black */
            --card: #ffffff;          /* Pure White */
            --text-dark: #1f1f23;     /* Dark Charcoal for text */
            --text-muted: #75757a;    /* Muted Gray */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* Dynamic Background Glow Elements */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(123, 44, 191, 0.4) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
            animation: floatGlow 8s infinite alternate ease-in-out;
        }
        body::before { top: -50px; left: -50px; }
        body::after { bottom: -50px; right: -50px; animation-delay: 4s; }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 20px) scale(1.2); }
        }

        .container {
            background: var(--card);
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .header-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        h2 { 
            color: var(--primary); 
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e1e1e6;
            border-radius: 14px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-dark);
            background-color: #f8f9fa;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(123, 44, 191, 0.15);
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(123, 44, 191, 0.3);
            transition: all 0.2s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 6px 20px rgba(123, 44, 191, 0.4);
        }

        /* Premium Touch Animation Feedback */
        button:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(123, 44, 191, 0.2);
        }

        #statusMessage {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            font-weight: 500;
            min-height: 20px;
        }

        /* Developer Branding Footer */
        .developer-credit {
            margin-top: 25px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
            z-index: 10;
            transition: color 0.3s ease;
            cursor: default;
        }

        .developer-credit span {
            color: var(--primary);
            font-weight: 600;
        }

        .developer-credit:hover {
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h2>BCA Portal 🎓</h2>
        <div class="subtitle">Secure Lecture Alert Registration</div>
    </div>
    
    <div class="input-group">
        <input type="text" id="studentName" placeholder="Full Name" required>
    </div>
    <div class="input-group">
        <input type="text" id="enrollNo" placeholder="Enrollment Number (GHRUA...)" required>
    </div>
    <div class="input-group">
        <input type="text" id="semester" placeholder="Semester (e.g., 5)" required>
    </div>
    <div class="input-group">
        <input type="tel" id="phoneNumber" placeholder="10-Digit Phone Number" required>
    </div>
    
    <button onclick="registerStudent()">Register Now</button>
    <p id="statusMessage"></p>
</div>

<!-- Developer Credit Line -->
<div class="developer-credit">Developed by <span>Yash Kshirasagar</span></div>

<script>
    async function registerStudent() {
        const statusMsg = document.getElementById('statusMessage');
        
        const data = {
            name: document.getElementById('studentName').value.trim(),
            enroll_no: document.getElementById('enrollNo').value.trim(),
            sem: document.getElementById('semester').value.trim(),
            phone: document.getElementById('phoneNumber').value.trim()
        };

        if (!data.name || !data.enroll_no || !data.sem || !data.phone) {
            statusMsg.style.color = "#d90429";
            statusMsg.innerText = "❌ Please fill all fields!";
            return;
        }

        statusMsg.style.color = "#3a86ff";
        statusMsg.innerText = "Processing registration...";

        try {
            const response = await fetch('/api/subscribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                statusMsg.style.color = "#38b000";
                statusMsg.innerText = "🎉 Registration Successful! SMS Sent.";
                
                // Clear inputs
                document.getElementById('studentName').value = "";
                document.getElementById('enrollNo').value = "";
                document.getElementById('semester').value = "";
                document.getElementById('phoneNumber').value = "";
            } else if (response.status === 403) {
                statusMsg.style.color = "#d90429";
                statusMsg.innerText = "⚠️ Access Denied: Enrollment not in Whitelist!";
            } else {
                statusMsg.style.color = "#d90429";
                statusMsg.innerText = "❌ Registration failed. Try again.";
            }
        } catch (e) {
            statusMsg.style.color = "#d90429";
            statusMsg.innerText = "❌ Connection error to server!";
        }
    }
</script>

</body>
</html>
